<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Rättningsverktyg</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #10a37f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0d8a6b;
        }
        #result {
            margin-top: 25px;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 5px;
            min-height: 40px;
        }
        .legend {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #444;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .legend p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-top: 0;">Egna Wordle-rättaren</h2>
    
    <div class="input-group">
        <label for="lengthInput">Hur många bokstäver har ordet?</label>
        <input type="number" id="lengthInput" value="5" min="1">
    </div>

    <div class="input-group">
        <label for="targetWord">Rätt ord (facit):</label>
        <input type="text" id="targetWord" placeholder="Skriv in rätt ord...">
    </div>

    <div class="input-group">
        <label for="guessWord">Gissning:</label>
        <input type="text" id="guessWord" placeholder="Skriv in gissningen...">
    </div>

    <button onclick="checkWord()">Rätta ordet</button>

    <div id="result"></div>

    <div class="legend">
        <strong>Förklaring:</strong>
        <p>🟢 Rätt bokstav på rätt plats</p>
        <p>🟡 Bokstaven finns i ordet (men fel plats)</p>
        <p>🔴 Bokstaven finns inte i ordet</p>
        <p>🟣 Gissningen har för många bokstäver (extra)</p>
        <p>🔵 Gissningen har för få bokstäver (saknas)</p>
    </div>
</div>

<script>
function checkWord() {
    // Hämtar värdena och gör dem till små bokstäver för att underlätta jämförelsen
    const length = parseInt(document.getElementById('lengthInput').value);
    const target = document.getElementById('targetWord').value.toLowerCase().trim();
    const guess = document.getElementById('guessWord').value.toLowerCase().trim();
    const resultDiv = document.getElementById('result');
    
    let feedback = "";

    // Går igenom gissningen upp till den bestämda längden på ordet
    for (let i = 0; i < length; i++) {
        // Om gissningen är kortare än ordets tänkta längd
        if (i >= guess.length) {
            feedback += "🔵";
        } 
        else {
            const guessChar = guess[i];
            
            // Om rätt ord är ifyllt och vi inte har passerat dess slut
            if (i < target.length) {
                const targetChar = target[i];
                
                if (guessChar === targetChar) {
                    feedback += "🟢"; // Rätt plats
                } 
                else if (target.includes(guessChar)) {
                    feedback += "🟡"; // Fel plats, men finns
                } 
                else {
                    feedback += "🔴"; // Finns inte alls
                }
            } else {
                // Säkerhetskoll om facit var kortare än den valda längden
                feedback += "🔴"; 
            }
        }
    }

    // Om gissningen har FÖR MÅNGA bokstäver jämfört med den valda längden
    if (guess.length > length) {
        for (let j = length; j < guess.length; j++) {
            feedback += "🟣";
        }
    }

    // Skriver ut resultatet på skärmen
    resultDiv.innerHTML = feedback;
}
</script>

</body>
</html>
