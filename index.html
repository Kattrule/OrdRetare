<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Rättningsverktyg</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 5px;
        }
        .legend {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #555;
            background: #eee;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Wordle-rättaren</h2>
    
    <div class="input-group">
        <label>Antal bokstäver:</label>
        <input type="number" id="lengthInput" value="5" min="1">
    </div>

    <div class="input-group">
        <label>Rätt ord:</label>
        <input type="text" id="targetWord" placeholder="Skriv facit...">
    </div>

    <div class="input-group">
        <label>Gissning:</label>
        <input type="text" id="guessWord" placeholder="Skriv din gissning...">
    </div>

    <button onclick="checkWord()">Rätta ordet</button>

    <div id="result"></div>

    <div class="legend">
        <strong>Förklaring:</strong><br>
        🟢 Rätt bokstav, rätt plats<br>
        🟡 Finns i ordet, fel plats<br>
        🔴 Finns inte i ordet<br>
        🟣 Gissningen var för lång<br>
        🔵 Bokstav saknas i gissningen
    </div>
</div>

<script>
function checkWord() {
    const target = document.getElementById('targetWord').value.toLowerCase().trim();
    const guess = document.getElementById('guessWord').value.toLowerCase().trim();
    const length = parseInt(document.getElementById('lengthInput').value);
    const resultDiv = document.getElementById('result');
    
    let feedback = "";

    // Vi loopar igenom det förväntade antalet bokstäver
    for (let i = 0; i < length; i++) {
        const targetChar = target[i];
        const guessChar = guess[i];

        // 1. Om gissningen saknar en bokstav på denna position (för kort)
        if (i >= guess.length) {
            feedback += "🔵";
        } 
        // 2. Om gissningen har en bokstav men facit är slut (för lång)
        // (Detta täcks egentligen av loopen nedanför om vi vill visa ALLA extra bokstäver)
        else if (i >= target.length) {
            feedback += "🟣";
        }
        // 3. Rätt bokstav på rätt plats
        else if (guessChar === targetChar) {
            feedback += "🟢";
        }
        // 4. Bokstaven finns i ordet men på fel plats
        else if (target.includes(guessChar)) {
            feedback += "🟡";
        }
        // 5. Bokstaven finns inte alls
        else {
            feedback += "🔴";
        }
    }

    // Om gissningen är längre än det inställda antalet bokstäver (Extra 🟣)
    if (guess.length > length) {
        for (let j = length; j < guess.length; j++) {
            feedback += "🟣";
        }
    }

    resultDiv.innerHTML = feedback;
}
</script>

</body>
</html>
