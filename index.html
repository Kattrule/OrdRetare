<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Rättningsverktyg - Mörkt Läge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #121212; /* Mörk bakgrund för hela sidan */
            color: #e0e0e0; /* Ljusgrå text */
        }
        .container {
            background: #1e1e1e; /* Mörkgrå ruta */
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Lite starkare skugga för mörkt läge */
            max-width: 400px;
            width: 100%;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ffffff;
        }
        input {
            width: 100%;
            padding: 10px;
            background-color: #2c2c2c; /* Mörkare inmatningsfält */
            color: #ffffff; /* Vit text i inmatningsfältet */
            border: 2px solid #444; /* Mörkgrå ram */
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            border-color: #10a37f; /* Grön ram när man klickar i fältet */
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #10a37f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0d8a6b;
        }
        #result {
            margin-top: 25px;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 5px;
            min-height: 40px;
        }
        .legend {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #bbb; /* Ljusare grå text för förklaringen */
            background: #2a2a2a; /* Mörk bakgrund för förklaringen */
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .legend p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-top: 0; color: #ffffff;">Egna Wordle-rättaren</h2>
    
    <div class="input-group">
        <label for="lengthInput">Hur många bokstäver har ordet?</label>
        <input type="number" id="lengthInput" value="5" min="1">
    </div>

    <div class="input-group">
        <label for="targetWord">Rätt ord (facit):</label>
        <input type="text" id="targetWord" placeholder="Skriv in rätt ord...">
    </div>

    <div class="input-group">
        <label for="guessWord">Gissning:</label>
        <input type="text" id="guessWord" placeholder="Skriv in gissningen...">
    </div>

    <button onclick="checkWord()">Rätta ordet</button>

    <div id="result"></div>

    <div class="legend">
        <strong style="color: #fff;">Förklaring:</strong>
        <p>🟢 Rätt bokstav på rätt plats</p>
        <p>🟡 Bokstaven finns i ordet (men fel plats)</p>
        <p>🔴 Bokstaven finns inte i ordet</p>
        <p>🟣 Gissningen har för många bokstäver (extra)</p>
        <p>🔵 Gissningen har för få bokstäver (saknas)</p>
    </div>
</div>

<script>
function checkWord() {
    const length = parseInt(document.getElementById('lengthInput').value);
    const target = document.getElementById('targetWord').value.toLowerCase().trim();
    const guess = document.getElementById('guessWord').value.toLowerCase().trim();
    const resultDiv = document.getElementById('result');
    
    let feedback = "";

    for (let i = 0; i < length; i++) {
        if (i >= guess.length) {
            feedback += "🔵";
        } 
        else {
            const guessChar = guess[i];
            
            if (i < target.length) {
                const targetChar = target[i];
                
                if (guessChar === targetChar) {
                    feedback += "🟢"; 
                } 
                else if (target.includes(guessChar)) {
                    feedback += "🟡"; 
                } 
                else {
                    feedback += "🔴"; 
                }
            } else {
                feedback += "🔴"; 
            }
        }
    }

    if (guess.length > length) {
        for (let j = length; j < guess.length; j++) {
            feedback += "🟣";
        }
    }

    resultDiv.innerHTML = feedback;
}
</script>

</body>
</html>
